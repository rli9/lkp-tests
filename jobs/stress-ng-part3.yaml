suite: stress-ng
testcase: stress-ng
category: benchmark

nr_threads: 100%

testtime:
  - 60s

stress-ng:
  test:
    - nanosleep
    - netdev
    - netlink-proc
    - netlink-task
    - ng
    - nice
    - nop
    - "null"
    # - null
    - numa
    - pagemove
    - pageswap
    - pci
    - personality
    - peterson
    - physmmap
    - physpage
    - pidfd
    - ping-sock
    - pipeherd
    - pkey
    # - plugin # run user provided stressor functions loaded from a shared library
    - poll
    - powmath
    - prctl
    - prio-inv
    - priv-instr
    - pseek
    - ptr-chase
    - ptrace
    - pty
    - quota
    - race-sched
    - ramfs
    - randlist
    - rawpkt
    - rawsock
    - rawudp
    - rdrand
    - readahead
    - reboot
    - regex
    - regs
    - remap
    # - resched # less meaningful test per PeterZ and Chenyu
    - resources
    - revio
    - ring-pipe
    - rlimit
    - rmap
    - rotate
    - rseq
    - rtc

---
nr_threads: 50%

stress-ng:
  test:
    - oom-pipe

---
stress-ng:
  test:
    - qsort
  method:
    - qsort-libc
    - qsort-bm

---
stress-ng:
  test:
    - prefetch
  method:
    - builtin
    - builtinl0
    - builtinl3
    - prefetcht0
    - prefetcht1
    - prefetcht2
    - prefetchnta

---
stress-ng:
  test:
    - prime
  method:
    - factorial
    - inc
    - pwr2
    - pwr10

---
stress-ng:
  test:
    - radixsort
  method:
    - radixsort-nonlibc

---
stress-ng:
  test:
    - opcode
  method:
    - random
    - text
    - inc
    - mixed

---
stress-ng:
  test:
    - pipe
    - pthread
  sched:
    - idle
    - fifo
    - rr
    - other
    - batch
    - deadline
