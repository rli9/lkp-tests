suite: stress-ng
testcase: stress-ng
category: benchmark

nr_threads: 100%

testtime:
  - 60s

stress-ng:
  test:
    - get
    - getrandom
    - goto
    # - gpu
    - hash
    - heapsort
    - hrtimers
    - hsearch
    - hyperbolic
    - icache
    - icmp-flood
    - idle-page
    - insertionsort
    - intmath
    - io-uring
    - ioport
    - ipsec-mb
    - itimer
    - jpeg
    - judy
    - kcmp
    - key
    - kill
    - klog
    - kvm
    - led
    - list
    - llc-affinity
    - lockbus
    - lockmix
    - logmath
    - longjmp
    - loop
    - lsm
    - malloc
    - matrix
    - matrix-3d
    - mcontend
    - membarrier
    - memcpy
    - memfd
    - memhotplug
    - memrate
    - mergesort
    - min-nanosleep
    - mincore
    - misaligned
    - mlock
    - mlockmany
    - mmap
    - mmapaddr
    - mmapfiles
    - mmapfixed
    - mmapfork
    - mmaprandom
    - mmaptorture
    - monte-carlo
    - mpfr
    - mprotect
    - mq
    - mremap
    - mseal
    - msg
    - msync
    - msyncmany
    - mtx
    - munmap
    - mutex

---
nr_threads: 20%

stress-ng:
  test:
    - loadavg
    - mmapmany

---
nr_threads: 50%

stress-ng:
  test:
    - memthrash

---
stress-ng:
  test:
    - mmapcow
    - mmaphuge

oom-killer:
  ignored: 1

---
stress-ng:
  test:
    - l1cache
  method:
    - forward
    - random
    - reverse

---
stress-ng:
  test:
    - lsearch
  method:
    - lsearch-libc
    - lsearch-nonlibc
    - lsearch-sentinel

---
stress-ng:
  test:
    - madvise
  advise:
    - normal
    - random
    - sequential
    - willneed
    - dontneed
    - free
    - remove
    - dontfork
    - dofork
    - hwpoison
    - mergeable
    - unmergeable
    - soft-offline
    - hugepage
    - nohugepage
    - dontdump
    - dodump
    - wipeonfork
    - keeponfork
    - cold
    - pageout
    - collapse
