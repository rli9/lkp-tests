suite: stress-ng
testcase: stress-ng
category: benchmark

nr_threads: 100%

testtime:
  - 60s

# docker run --rm ghcr.io/colinianking/stress-ng --class cpu-cache?
stress-ng:
  test:
    - cache
    - cacheline
    - dekker
    - far-branch
    - heapsort
    - hsearch
    - icache
    - judy
    - list
    - llc-affinity
    - lockbus
    - malloc
    - matrix
    - matrix-3d
    - membarrier
    - memcpy
    - mergesort
    - misaligned
    - peterson
    - shellsort
    - skiplist
    - sparsematrix
    - str
    - stream
    - tree
    - tsearch
    - vecfp
    - vecmath
    - vecshuf
    - vecwide
    - wcs

---
stress-ng:
  test:
    - flushcache

oom-killer:
  ignored: 1

---
stress-ng:
  test:
    - qsort
  method:
    - qsort-libc
    - qsort-bm

---
stress-ng:
  test:
    - l1cache
  method:
    - forward
    - random
    - reverse

---
stress-ng:
  test:
    - prefetch
  method:
    - builtin
    - builtinl0
    - builtinl3
    - prefetcht0
    - prefetcht1
    - prefetcht2
    - prefetchnta

---
stress-ng:
  test:
    - zlib
  method:
    - random
    - 00ff
    - ascii01
    - asciidigits
    - bcd
    - binary
    - brown
    - double
    - fixed
    - gcr
    - gray
    - inc16
    - latin
    - lehmer
    - logmap
    - lfsr32
    - lrand48
    - morse
    - nybble
    - objcode
    - parity
    - pink
    - rarely1
    - rarely0
    - rdrand
    - ror32
    - text
    - utf8
    - zero

---
stress-ng:
  test:
    - bsearch
  method:
    - bsearch-libc
    - bsearch-nonlibc
    - ternary

---
stress-ng:
  test:
    - radixsort
  method:
    - radixsort-nonlibc

---
stress-ng:
  test:
    - lsearch
  method:
    - lsearch-libc
    - lsearch-nonlibc
    - lsearch-sentinel
