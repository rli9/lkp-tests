suite: stress-ng
testcase: stress-ng
category: benchmark

nr_threads: 100%

testtime:
  - 60s

stress-ng:
  test:
    - tee
    - time-warp
    - timer
    - timerfd
    - timermix
    - tlb-shootdown
    - tmpfs
    - tree
    - trig
    - tsc
    - tsearch
    - tun
    - udp
    - udp-flood
    - umask
    - umount
    - unlink
    - unshare
    - uprobe
    - urandom
    - userfaultfd
    - usersyscall
    - varyload
    - vdso
    - veccmp
    - vecfp
    - vecmath
    - vecshuf
    - vecwide
    - vforkmany
    - vm
    - vm-addr
    - vm-rw
    - vm-segv
    - vm-splice
    - vma
    - vnni
    - wait
    - waitcpu
    # - watchdog # watchdog: /dev/watchdog does not exist, skipping test
    - wcs
    - workload
    - x86cpuid
    - x86syscall
    # - yield # less meaningful test per PeterZ and Chenyu
    - zero
    - zombie

---
stress-ng:
  test:
    - zlib
  method:
    - random
    - 00ff
    - ascii01
    - asciidigits
    - bcd
    - binary
    - brown
    - double
    - fixed
    - gcr
    - gray
    - inc16
    - latin
    - lehmer
    - logmap
    - lfsr32
    - lrand48
    - morse
    - nybble
    - objcode
    - parity
    - pink
    - rarely1
    - rarely0
    - rdrand
    - ror32
    - text
    - utf8
    - zero
