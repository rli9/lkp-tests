---
nr_threads: 50%

stress-ng:
  test:
    - clone

---
stress-ng:
  test:
    - cachehammer
    - flushcache
    - forkheavy

oom-killer:
  ignored: 1

---
stress-ng:
  test:
    - bubblesort
  method:
    - bubblesort-fast
    - bubblesort-naive

---
stress-ng:
  test:
    - cyclic
  method:
    - clock_ns
    - itimer
    - poll
    - posix_ns
    - pselect
    - usleep

---
stress-ng:
  test:
    - bsearch
  method:
    - bsearch-libc
    - bsearch-nonlibc
    - ternary

---
stress-ng:
  test:
    - fractal
  method:
    - mandelbrot
    - julia

---
stress-ng:
  test:
    - bad-ioctl
  method:
    - inc
    - random
    - random-inc
    - stride
