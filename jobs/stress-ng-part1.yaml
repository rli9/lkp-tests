suite: stress-ng
testcase: stress-ng
category: benchmark

nr_threads: 100%

testtime:
  - 60s

stress-ng:
  test:
    - af-alg
    - affinity
    - aio
    - alarm
    - atomic
    - bad-altstack
    - besselmath
    - bigheap
    - bitonicsort
    - bitops
    - branch
    - brk
    - cache
    - cacheline
    - cap
    - cgroup
    - chroot
    - chyperbolic
    - clock
    - close
    - context
    - cpu
    - cpu-online
    - cpu-sched
    - crypt
    - ctrig
    - daemon
    # - dccp
    - dekker
    - dev
    - dev-shm
    - dfp
    - dynlib
    - easy-opcode
    - efivar
    # - eigen
    - eigen-ops
    - enosys
    - epoll
    - exec
    - exit-group
    - expmath
    - factor
    - far-branch
    - fault
    - fd-abuse
    - fd-fork
    - fd-race
    - fibsearch
    - fifo
    - filerace
    - flipflop
    - fma
    - fork
    - fp
    - fp-error
    - full
    - funccall
    - funcret
    - futex

