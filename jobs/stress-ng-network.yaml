suite: stress-ng
testcase: stress-ng
category: benchmark

nr_threads: 100%

testtime:
  - 60s

# docker run --rm ghcr.io/colinianking/stress-ng --class network?
stress-ng:
  test:
    - epoll
    - icmp-flood
    - netdev
    - ping-sock
    - rawpkt
    - rawsock
    - rawudp
    - sctp
    - sockabuse
    - sockdiag
    - sockfd
    - tun
    - udp
    - udp-flood

---
stress-ng:
  test:
    - sock
    - sockmany
    - sockpair
  type:
    - stream
    - dgram
    - seqpacket
