suite: kselftests
testcase: kselftests
category: benchmark

kselftests:
  group:
    - mm
  test:
    - vmalloc-performance

---
# vmalloc stress test, nr_threads=1 and iterations=1 used 30-40s
# vmalloc stress test, nr_threads=4 and iterations=3 used 1700-1900s
nr_threads:
  - 1
  - 4
iterations:
  - 1
  - 3

kselftests:
  group:
    - mm
  test:
    - vmalloc-stress

---
kselftests:
  group:
    - dma

---
kselftests:
  group:
    - landlock
  test:
    - fs_bench

kernel_cmdline: lsm=landlock

---
kselftests:
  group:
    - filesystems
  test:
    - file_stressor
