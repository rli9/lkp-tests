suite: stress-ng
testcase: stress-ng
category: benchmark

nr_threads: 100%

testtime:
  - 60s

stress-ng:
  test:
    - schedmix
    - schedpolicy
    - sctp
    - seal
    - seccomp
    - secretmem
    - seek
    - sem
    - sem-sysv
    - sendfile
    - session
    - set
    - shellsort
    - shm
    - shm-sysv
    - sigabrt
    - sigbus
    - sigchld
    - sigfd
    - sigfpe
    - sighup
    - sigill
    - sigio
    - signal
    - signest
    - sigpending
    - sigpipe
    - sigq
    - sigrt
    - sigsegv
    - sigsuspend
    - sigtrap
    - sigurg
    - sigvtalrm
    - sigxcpu
    - sigxfsz
    - skiplist
    - sleep
    - smi
    - sockabuse
    - sockdiag
    - sockfd
    - softlockup
    - sparsematrix
    - spawn
    - splice
    - stackmmap
    - statmount
    - str
    - stream
    - syncload
    - sysbadaddr
    - syscall
    - sysfs
    - sysinfo
    - sysinval

---
stress-ng:
  test:
    - switch
  method:
    - mq
    - pipe
    - sem-sysv

---
stress-ng:
  test:
    - spinmem
  method:
    - 8bit
    - 16bit
    - 32bit
    - 64bit
    - 128bit

---
stress-ng:
  test:
    - sock
    - sockmany
    - sockpair
  type:
    - stream
    - dgram
    - seqpacket
